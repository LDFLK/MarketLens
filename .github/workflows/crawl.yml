name: Jobs Scraper

on:
  schedule:
    
    - cron: "0 2 * * *"
  workflow_dispatch: 

env:
  TZ: Asia/Colombo
  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip' 

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r research/crawl4ai_research/requirements.txt
          # Crawl4AI requires playwright browsers to be installed
          python -m playwright install --with-deps chromium

      - name: Run Scraper
        run: python research/crawl4ai_research/main.py

      - name: Commit and Push Jobs Data
        run: |
          git config --global user.name "crawl-bot[bot]"
          git config --global user.email "crawl-bot@users.noreply.github.com"
          
          git add storage/jobs/jobs.json
          
          TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')
          git commit -m "Auto-update jobs data - $TIMESTAMP" || echo "No changes to commit"
          git push origin main